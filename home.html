<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
body{
    min-height: 100vh;
    background: linear-gradient(135deg, #000000, #7f0000);
    background-size: 200% 200%;
    animation: pulseBg 6s ease infinite;
}

@keyframes pulseBg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

        .glass {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
        }

        .pokedex-red {
            background-color: #b91c1c;
        }

        .pokedex-red:hover {
            background-color: #991b1b;
        }

        .card-theme {
            background-color: #1f2937;
            border: 3px solid #5a5656;
            box-shadow: -2px 4px 0 #111;
        }
    </style>
</head>

<body class="text-white relative">

<a href="index.html">
    <img src="Pokédex_logo.png"
         class="fixed top-16 left-4 w-40 z-50 hover:scale-105 transition cursor-pointer">
</a>

<div class="fixed top-10 left-1/2 -translate-x-1/2 w-[90%] max-w-6xl z-40">

    <div class="flex flex-col md:flex-row items-center gap-6 
                bg-black/80 border-4 border-red-700 
                rounded-2xl px-6 py-5 shadow-[0_0_25px_rgba(255,0,0,0.5)]">

        <div class="flex-1 relative">
            <input id="searchInput"
                type="text"
                placeholder="Search Pokémon..."
                class="w-full p-4 rounded-xl 
                       bg-black text-white 
                       border-2 border-red-600
                       focus:outline-none 
                       focus:border-red-400
                       focus:shadow-[0_0_12px_rgba(255,0,0,0.7)]
                       transition duration-200" />

            <div id="suggestions"
                class="absolute bg-black border-2 border-red-600 
                       shadow-lg rounded-xl w-full mt-2 hidden 
                       z-50 max-h-60 overflow-y-auto">
            </div>
        </div>

        <button id="searchBtn"
            class="px-6 py-4 rounded-xl 
                   bg-red-700 text-white font-bold
                   border-2 border-black
                   shadow-md
                   hover:bg-red-600
                   hover:shadow-[0_0_15px_rgba(255,0,0,0.8)]
                   active:scale-95
                   transition duration-150">
            Search
        </button>

        <div class="flex items-center gap-3">
            <span class="text-red-400 font-semibold tracking-wide">
                Sort
            </span>

            <select id="sortOrder"
                class="bg-black text-white px-5 py-3 rounded-xl 
                       border-2 border-red-600
                       focus:outline-none 
                       focus:border-red-400
                       focus:shadow-[0_0_10px_rgba(255,0,0,0.7)]
                       transition duration-200">
                <option value="id-asc">Lowest #</option>
                <option value="id-desc">Highest #</option>
                <option value="name-asc">A–Z</option>
                <option value="name-desc">Z–A</option>
            </select>
        </div>

    </div>
</div>
    <main class="p-10 pt-40">
        <div id="pokemonGrid"
            class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        </div>

        <div id="pagination"
            class="flex justify-center items-center gap-4 mt-10 flex-wrap">
            <button id="prevPage"
                class="pokedex-red px-6 py-3 rounded shadow font-semibold">
                Prev
            </button>

            <button id="nextPage"
                class="pokedex-red px-6 py-3 rounded shadow font-semibold">
                Next
            </button>
        </div>
    </main>

    <div id="modal"
    class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-[100]">

        <div id="modalContent"
            class="bg-gray-900 text-white rounded-lg p-6 w-full max-w-2xl overflow-y-auto border-4 border-red-700 shadow-xl">
        </div>
    </div>

    <script src="home.js"></script>
</body>
</html>
