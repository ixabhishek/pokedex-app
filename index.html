<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>

    <main>
        <img src="#" class="pokemon_image">

        <h3 class="pokemon_data">
            <span class="pokemon_number"></span>
            <span class="pokemon_name"></span>
        </h3>

        <form class="search">
            <input type="search"
            class="input_search"
            placeholder="Name or number?"
            required
            />
        </form>

        <div class="buttons">
            <button class="button btn_prev">&lt</button>
            <button class="button btn_next">&gt</button>
        </div>

        <div class="pokedex_container">
        <img src="pokedex.png" class="pokedex">
        </div>


    </main>

    <img src="Pokédex_logo.png" class="pokedex_logo">

    <script src="script.js"></script>

        
</body>

</html>
