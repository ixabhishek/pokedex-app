<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
body{
    min-height: 100vh;
    background: linear-gradient(135deg, #000000, #7f0000);
    background-size: 200% 200%;
    animation: pulseBg 6s ease infinite;
}

@keyframes pulseBg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

        .glass {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
        }

        .pokedex-red {
            background-color: #b91c1c;
        }

        .pokedex-red:hover {
            background-color: #991b1b;
        }

        .card-theme {
            background-color: #1f2937;
            border: 3px solid #5a5656;
            box-shadow: -2px 4px 0 #111;
        }
    </style>
</head>

<body class="text-white relative">

<a href="index.html">
    <img src="Pokédex_logo.png"
         class="fixed top-5 left-25 w-28 z-50 hover:scale-105 transition cursor-pointer">
</a>

<div class="fixed top-0 left-0 w-full z-40 
            bg-black border-b-4 border-red-700 
            shadow-[0_0_20px_rgba(255,0,0,0.5)]">

    <div class="max-w-7xl mx-auto px-6 py-4 
                flex flex-col md:flex-row 
                items-center gap-4">

        <div class="flex-1 relative">
            <input id="searchInput"
                type="text"
                placeholder="Search Pokémon..."
                class="w-full p-3 rounded-xl 
                       bg-gray-900 text-white 
                       border-2 border-red-600
                       focus:outline-none 
                       focus:border-red-400
                       transition duration-200" />

            <div id="suggestions"
                class="absolute bg-black border-2 border-red-600 
                       rounded-xl w-full mt-2 hidden 
                       z-50 max-h-60 overflow-y-auto">
            </div>
        </div>

        <button id="searchBtn"
            class="px-6 py-3 rounded-xl 
                   bg-red-700 text-white font-bold
                   hover:bg-red-600
                   transition duration-150">
            Search
        </button>

        <select id="sortOrder"
            class="bg-gray-900 text-white px-5 py-3 rounded-xl 
                   border-2 border-red-600
                   focus:outline-none focus:border-red-400
                   transition duration-200">
            <option value="id-asc">Lowest #</option>
            <option value="id-desc">Highest #</option>
            <option value="name-asc">A–Z</option>
            <option value="name-desc">Z–A</option>
        </select>

    </div>
</div>
    <main class="p-10 pt-40">
        <div id="pokemonGrid"
            class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        </div>

<div id="pageInfo"
     class="mx-auto text-center mb-6 
            bg-black border-4 border-red-700 
            text-white font-semibold 
            px-6 py-3 rounded-xl 
            shadow-[0_0_15px_rgba(255,0,0,0.5)]">
</div>

        <div id="pagination"
            class="flex justify-center items-center gap-4 mt-10 flex-wrap">
            <button id="prevPage"
                class="pokedex-red px-6 py-3 rounded shadow font-semibold">
                Prev
            </button>

            <button id="nextPage"
                class="pokedex-red px-6 py-3 rounded shadow font-semibold">
                Next
            </button>
        </div>
    </main>

    <script src="home.js"></script>
</body>
</html>
